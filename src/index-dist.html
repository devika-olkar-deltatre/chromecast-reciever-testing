<html>
<head>
  <link rel="stylesheet" type="text/css" href="diva.min.css">
</head>
<body>

  <div id="title"></div>

  <div id="error">
    <span id="message"></span>
  </div>

  <div id="loading">
    <!-- <div id="spinner"></div> -->
    <div class="sk-three-bounce">
        <div class="sk-child sk-bounce1"></div>
        <div class="sk-child sk-bounce2"></div>
        <div class="sk-child sk-bounce3"></div>
      </div>
  </div>

  <video id="video" preload="none" webkit-playsinline playsinline></video>

  <div id="controls">
    <div id="play"></div>
    <div id="pause"></div>
    <div id="current-time">00:00:00</div>
    <div id="timeline"><div id="bar"></div></div>
    <div id="duration">00:00:00</div>
    <div id="live"><i class="circle"></i><span>LIVE NOW</span></div>
    <div id="nolive"><i class="circle"></i><span>GO LIVE</span></div>
  </div>

  <div id="debugPanel">
    <div id="receiverVersion" class="debugRow debugContent">Receiver v2.1.5</div>
    <div id="pluginVideo" class="debugRow debugContent"></div>
    <div class="debugRow"><div class="debugLabel">Bitrate</div><div id="bitrate" class="debugContent"></div></div>
    <div class="debugRow"><div class="debugLabel">Audio Track</div><div id="audioTrack" class="debugContent"></div></div>
    <div class="debugRow"><div class="debugLabel">CurrentTime</div><div id="videoCurrentTime" class="debugContent"></div></div>
    <div class="debugRow"><div class="debugLabel">Duration</div><div id="videoDuration" class="debugContent"></div></div>
    <div class="debugRow"><div class="debugLabel">BufferSize</div><div id="bufferSize" class="debugContent"></div></div>
  </div>

  <script src="diva.min.js"></script>

</body>
</html>
