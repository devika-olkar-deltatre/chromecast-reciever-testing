<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Diva Chromecast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="diva.css">
</head>
<body>

  <div id="title"></div>

  <div id="error">
    <span id="message"></span>
  </div>

  <div id="loading">
    <div class="sk-three-bounce">
        <div class="sk-child sk-bounce1"></div>
        <div class="sk-child sk-bounce2"></div>
        <div class="sk-child sk-bounce3"></div>
      </div>
  </div>

  <div id="bgImageContainer">
    <img id="bgImage" src="" alt="Background"/>
  </div>

  <video id="video" preload="none"></video>

  <div id="controls">
    <div id="play"></div>
    <div id="pause"></div>
    <div id="current-time">00:00:00</div>
    <div id="timeline"><div id="bar"></div></div>
    <div id="duration">00:00:00</div>
    <div id="live"><i class="circle"></i><span>LIVE NOW</span></div>
    <div id="nolive"><i class="circle"></i><span>GO LIVE</span></div>
  </div>

  <script type="text/javascript" src="https//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script type="text/javascript" src="lib/hls.min.js"></script>
  <script type="text/javascript" src="lib/diva-html5-conviva-plugin.js"></script>
  <script type="text/javascript" src="diva.js"></script>

</body>
</html>
