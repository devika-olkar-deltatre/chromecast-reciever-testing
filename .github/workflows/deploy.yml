name: "Deploy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: Test
        type: choice
        options:
          - Test
          - Staging
          - Production
      osdebugger:
        description: "Include OS Debugger ?"
        required: true
        type: boolean
        default: false
      tag:
        description: "Tag to deploy"
        required: true
        type: string  # Free-form input

jobs:
  deploy:
    name: "Deploy Rogers Chromecast Receiver to ${{ inputs.environment }}"
    runs-on: vxp-ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
      DEBUG_ENABLED: ${{ vars.DEBUG_ENABLED }}
      ROGERS_CONVIVA_CUSTOMER_KEY: ${{ vars.ROGERS_CONVIVA_CUSTOMER_KEY }}
      ROGERS_CONVIVA_GATEWAY_URL: ${{ vars.ROGERS_CONVIVA_GATEWAY_URL }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      - name: "Installing node"
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1

      - name: "Install Yarn global tool"
        run: |
          npm install --global yarn

      - name: " Yarn install"
        run: |
          yarn install --frozen-lockfile

      - name: "Fetch all tags"
        run: git fetch --tags

      - name: "Check if tag exists"
        id: check_tag
        run: |
          if git rev-parse -q --verify "refs/tags/${{ inputs.tag }}" > /dev/null; then
            echo "Tag exists."
          else
            echo "Tag ${{ inputs.tag }} does not exist."
            exit 1
          fi

      - name: "Checkout selected tag"
        run: git checkout ${{ inputs.tag }}

      - name: "Install dependencies"
        run: yarn install

      - name: "Run the build"
        run: yarn build --mode production --env osdebugger=${{ github.event.inputs.osdebugger }}

      - name: "Print Current Dir"
        run: ls -la dist

      - name: "Check for favicon.ico"
        run: test -f dist/favicon.ico && echo "favicon.ico exists" || echo "favicon.ico missing"

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: chromecast-receiver
          path: dist/**/*
          if-no-files-found: error

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.ROGERS_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.ROGERS_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: "Print S3 bucket name"
        run: echo ${{ vars.ROGERS_AWS_S3_BUCKET }}${{ vars.ROGERS_AWS_S3_PATH }}

      - name: Upload the app to S3 bucket
        shell: bash
        run: |
          aws s3 cp dist s3://${{ vars.ROGERS_AWS_S3_BUCKET }}${{ vars.ROGERS_AWS_S3_PATH }} --recursive --cache-control no-cache