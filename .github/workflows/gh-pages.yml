name: "Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: "Build & Deploy to GitHub Pages"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.1

      - name: "Install Yarn"
        run: npm install --global yarn

      - name: "Install dependencies"
        run: yarn install --frozen-lockfile

      - name: "Build"
        run: yarn dist
        env:
          DEBUG_ENABLED: 'true'
          ROGERS_CONVIVA_CUSTOMER_KEY: ${{ vars.ROGERS_CONVIVA_CUSTOMER_KEY || '' }}
          ROGERS_CONVIVA_GATEWAY_URL: ${{ vars.ROGERS_CONVIVA_GATEWAY_URL || '' }}

      - name: "Deploy to gh-pages branch"
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
